    <!-- ─── Primary SEO ─────────────────────────────────────────────────── -->

    <!-- ─── Structured Data (JSON-LD) ───────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "OrganizeShots",
      "url": "https://www.organizeshots.com/",
      "description": "Free browser-based screenshot organizer that automatically sorts screenshots into smart folders. No upload, no sign-up, 100% private.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Auto-sort screenshots into 10 categories",
        "Smart text recognition",
        "Duplicate detection",
        "100% browser-based, no upload",
        "ZIP export with organized folders",
        "Free, no account required"
      ],
      "screenshot": "https://www.organizeshots.com/og-image.png",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "reviewCount": "1"
      }
    }
    </script>

    <!-- ─── FAQ Structured Data ──────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How to organize screenshots automatically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upload your screenshots to OrganizeShots. The app analyses each screenshot and automatically sorts them into 10 folders: OTP/Security, Payments/Receipts, WhatsApp/Chats, Social Media, Study/Notes, Photos, Memes, Documents, Unknown, and Duplicates. Download the ZIP with all folders organized."
          }
        },
        {
          "@type": "Question",
          "name": "Is OrganizeShots free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, OrganizeShots is completely free. No subscription, no sign-up, no hidden fees. Just open the website and start organizing screenshots."
          }
        },
        {
          "@type": "Question",
          "name": "Does OrganizeShots upload my screenshots to a server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. OrganizeShots is 100% browser-based. All processing happens on your device. Your screenshots never leave your browser."
          }
        },
        {
          "@type": "Question",
          "name": "How many screenshots can I organize at once?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can organize up to 100 screenshots in a single batch. PNG, JPG, WebP, and HEIC formats are supported."
          }
        }
      ]
    }
    </script>
